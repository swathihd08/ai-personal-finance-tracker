# Streamlit Secrets Template for Cloud Storage
# 
# Instructions:
# 1. Sign up for free Supabase account at https://supabase.com
# 2. Create a new project
# 3. Go to Settings → API to find your URL and Key (service role key)
# 4. Copy this file to .streamlit/secrets.toml and fill in your values
# 5. For Streamlit Cloud: go to app settings → Secrets and paste the content below
#

SUPABASE_URL = "https://your-project.supabase.co"
SUPABASE_KEY = "your-service-role-key"
